services:
  app:
    build: .
    container_name: projects-community
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PROJECTS_COMMUNITY_DB_PATH=/app/data/projects.db
      - AI_PROVIDER=deepseek
      - DEEPSEEK_API_KEY=${DEEP...Y:-}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
      - DEEPSEEK_MODEL=deepseek-chat
      - GITHUB_TOKEN=*
    volumes:
      - data:/app/data
    restart: unless-stopped
