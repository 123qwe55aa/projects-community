services:
  app:
    build: .
    container_name: projects-community
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PROJECTS_COMMUNITY_DB_PATH
      - AI_PROVIDER
      - DEEPSEEK_API_KEY
      - DEEPSEEK_BASE_URL
      - DEEPSEEK_MODEL
      - GITHUB_TOKEN
    volumes:
      - data:/app/data
    restart: unless-stopped
